main: http_server
modules: 
  - module: http_server
    version: latest
  - module: rpc
    version: latest
    with:
      servers:
        hello: target.local:31415
steps:
  - assert: !phs main.method == "POST" && main.path == "/hello" && main.body.name
    else:
      - return:
          status_code: 400
          body: 
            message: "Bad Request"
          headers:
            Content-Type: application/json
  - use: rpc
    with:
      server: hello
      params:
        name: !phs main.body.name
  # - rpc: util
  #   with:
  #     name: !phs main.body.name
  # - payload: !phs rpc.util(main.body.name)
  - return:
      status_code: 200
      body: !phs payload
      headers:
        Content-Type: application/json
